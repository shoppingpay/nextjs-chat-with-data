services:
  postgres-phase2:
    image: postgres:16-alpine
    container_name: nextjs-md-project-postgres-phase2
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_md_project}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-phase2-data:/var/lib/postgresql/data

  redis-phase2:
    image: redis:7.4-alpine
    container_name: nextjs-md-project-redis-phase2
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-nextjs-md-project-redis-dev-pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-phase2-data:/data

volumes:
  postgres-phase2-data:
  redis-phase2-data:
